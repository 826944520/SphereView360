name: Build Unsigned IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build SphereView360iOS (Unsigned IPA)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build archive
        run: |
          xcodebuild archive \
            -project SphereView360.xcodeproj \
            -scheme SphereView360iOS \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "${{ runner.temp }}/SphereView360iOS.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned IPA
        run: |
          APP_PATH="${{ runner.temp }}/SphereView360iOS.xcarchive/Products/Applications/SphereView360iOS.app"
          IPA_DIR="${{ runner.temp }}/ipa-build"
          mkdir -p "${IPA_DIR}/Payload"
          cp -R "${APP_PATH}" "${IPA_DIR}/Payload/"
          cd "${IPA_DIR}"
          zip -r -y "${{ runner.temp }}/SphereView360iOS-unsigned.ipa" Payload
          echo "IPA created at ${{ runner.temp }}/SphereView360iOS-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SphereView360iOS-unsigned-${{ github.sha }}
          path: "${{ runner.temp }}/SphereView360iOS-unsigned.ipa"
          retention-days: 7

      - name: Upload dSYM artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SphereView360iOS-dSYMs-${{ github.sha }}
          path: "${{ runner.temp }}/SphereView360iOS.xcarchive/dSYMs"
          retention-days: 7
